# hpc-daemon configuration.
# Every field is optional; omitted values fall back to built-in defaults.

# Address agents dial for the gRPC control plane.
grpc_addr = "0.0.0.0:7443"
# Address the REST/JSON API listens on (CLI + monitor call this).
http_addr = "0.0.0.0:8080"
# Directory for the embedded redb state database (use /var/lib/hpc in prod).
data_dir = "./data"

# A node with no heartbeat within this window is marked unreachable.
node_timeout = "30s"
# Cadence the daemon directs agents to report metrics at.
metrics_interval = "10s"

# Degradation thresholds (fractions 0.0..=1.0, except load which is per-core).
[thresholds]
cpu_degraded = 0.90
memory_degraded = 0.90
disk_degraded = 0.85
load_per_core_degraded = 2.0

[log]
# tracing env-filter directive; RUST_LOG overrides this at runtime.
filter = "info,hpc_daemon=debug"
json = false
with_location = false
